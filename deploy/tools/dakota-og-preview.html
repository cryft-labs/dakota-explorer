<!doctype html>
<html lang=en>
<head>
<meta charset=utf-8>
<style>
*{box-sizing:border-box}
html,body{width:1200px;height:630px;margin:0;overflow:hidden}
body{color:#f2fbf8;font-family:Montserrat,Arial,sans-serif;background:
radial-gradient(circle at 10% 20%,#2bd4aa 0 1px,transparent 2px),
radial-gradient(circle at 80% 72%,#d9f5ed 0 1px,transparent 2px),
radial-gradient(circle at 18% 18%,rgba(34,202,156,.16),transparent 31%),
linear-gradient(135deg,#051d18,#07362d 54%,#075d5b);background-size:83px 71px,127px 109px,100% 100%,100% 100%}
.frame{position:absolute;inset:34px;display:flex;align-items:center;justify-content:center;
border:1px solid rgba(45,213,170,.35);border-radius:32px;background:rgba(3,29,24,.48);
box-shadow:inset 0 1px rgba(255,255,255,.04),0 30px 90px rgba(0,0,0,.28)}
.content{width:940px;display:flex;align-items:center;gap:62px}
.logo{width:190px;height:205px;flex:0 0 auto;filter:drop-shadow(0 18px 30px rgba(0,0,0,.3))}
.logo svg{width:100%;height:100%}.copy{min-width:0}
.eyebrow{margin:0 0 16px;color:#35d6a8;font-size:18px;font-weight:800;line-height:1;
letter-spacing:3px;text-transform:uppercase}
h1{margin:0;color:#f4fbf9;font-size:54px;font-weight:760;line-height:1.08;letter-spacing:0}
p{max-width:700px;margin:24px 0 0;color:#b9d1ca;font-size:22px;font-weight:500;line-height:1.52}
.pills{display:flex;gap:12px;margin-top:27px}
.pill{padding:9px 15px;border:1px solid rgba(53,214,168,.42);border-radius:999px;
color:#d8f4ec;background:rgba(25,116,94,.38);font-size:15px;font-weight:700;line-height:1}
</style>
</head>
<body>
<main class=frame>
  <div class=content>
    <div class=logo>{{LOGO}}</div>
    <div class=copy>
      <div class=eyebrow>Network Explorer</div>
      <h1>Dakota Network Explorer</h1>
      <p>Search blocks, transactions, tokens, smart contracts, addresses, and IPFS CIDs across the Dakota Cards ecosystem.</p>
      <div class=pills>
        <span class=pill>Live network data</span>
        <span class=pill>IPFS CID gateway</span>
      </div>
    </div>
  </div>
</main>
</body>
</html>
